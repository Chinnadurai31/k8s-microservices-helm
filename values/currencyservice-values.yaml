name: currencyservice
containerName: server
image: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice:v0.10.5
replicas: 1
terminationGracePeriodSeconds: 5

serviceAccount:
  create: true

podSecurityContext:
  fsGroup: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true

ports:
  - name: grpc
    containerPort: 7000

env:
  - name: PORT
    value: "7000"
  - name: DISABLE_PROFILER
    value: "1"

readinessProbe:
  grpc:
    port: 7000

livenessProbe:
  grpc:
    port: 7000

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

services:
  - name: currencyservice
    type: ClusterIP
    ports:
      - name: grpc
        port: 7000
        targetPort: 7000
