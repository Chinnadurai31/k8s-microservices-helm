name: paymentservice
containerName: server
image: us-central1-docker.pkg.dev/google-samples/microservices-demo/paymentservice:v0.10.5
replicas: 1
terminationGracePeriodSeconds: 5

serviceAccount:
  create: true

podSecurityContext:
  fsGroup: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true

ports:
  - containerPort: 50051

env:
  - name: PORT
    value: "50051"
  - name: DISABLE_PROFILER
    value: "1"

readinessProbe:
  grpc:
    port: 50051

livenessProbe:
  grpc:
    port: 50051

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

services:
  - name: paymentservice
    type: ClusterIP
    ports:
      - name: grpc
        port: 50051
        targetPort: 50051
