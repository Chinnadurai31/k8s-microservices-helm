name: adservice
containerName: server
image: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice:v0.10.5
replicas: 1
terminationGracePeriodSeconds: 5

serviceAccount:
  create: true

podSecurityContext:
  fsGroup: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true

ports:
  - containerPort: 9555

env:
  - name: PORT
    value: "9555"

readinessProbe:
  initialDelaySeconds: 20
  periodSeconds: 15
  grpc:
    port: 9555

livenessProbe:
  initialDelaySeconds: 20
  periodSeconds: 15
  grpc:
    port: 9555

resources:
  requests:
    cpu: 200m
    memory: 180Mi
  limits:
    cpu: 300m
    memory: 300Mi

services:
  - name: adservice
    type: ClusterIP
    ports:
      - name: grpc
        port: 9555
        targetPort: 9555
